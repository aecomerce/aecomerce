<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated pandas matplotlib code editor">
  <defs>
    <linearGradient id="winbg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1B26"/>
      <stop offset="100%" stop-color="#16161E"/>
    </linearGradient>

    <!-- typewriter reveal clips (dur 9s loop) -->
    <clipPath id="d1"><rect x="56" y="80"  width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.033;0.133;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="d2"><rect x="56" y="114" width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.133;0.233;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="d4"><rect x="56" y="182" width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.233;0.333;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="d5"><rect x="56" y="216" width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.333;0.433;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="d6"><rect x="56" y="250" width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.433;0.533;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="d7"><rect x="56" y="284" width="0" height="26">
      <animate attributeName="width" values="0;0;470;470" keyTimes="0;0.533;0.633;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="718" height="378" rx="14" fill="url(#winbg2)" stroke="#2A2E42" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="1" y="1" width="718" height="44" rx="14" fill="#1F2335"/>
  <rect x="1" y="30" width="718" height="15" fill="#1F2335"/>
  <circle cx="28" cy="23" r="6" fill="#F7768E"/>
  <circle cx="50" cy="23" r="6" fill="#E0AF68"/>
  <circle cx="72" cy="23" r="6" fill="#9ECE6A"/>
  <text x="360" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13"
        fill="#565F89" letter-spacing="1">arkadiy@analytics — report.py</text>

  <!-- gutter divider -->
  <line x1="46" y1="45" x2="46" y2="379" stroke="#22263A" stroke-width="1"/>

  <!-- line numbers -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#3B4261" text-anchor="end">
    <text x="38" y="100">1</text>
    <text x="38" y="134">2</text>
    <text x="38" y="168">3</text>
    <text x="38" y="202">4</text>
    <text x="38" y="236">5</text>
    <text x="38" y="270">6</text>
    <text x="38" y="304">7</text>
  </g>

  <!-- code -->
  <g font-family="'JetBrains Mono', monospace" font-size="18">
    <g clip-path="url(#d1)">
      <text x="56" y="100">
        <tspan fill="#BB9AF7">import </tspan><tspan fill="#C0CAF5">pandas </tspan><tspan fill="#BB9AF7">as </tspan><tspan fill="#C0CAF5">pd</tspan>
      </text>
    </g>

    <g clip-path="url(#d2)">
      <text x="56" y="134">
        <tspan fill="#BB9AF7">import </tspan><tspan fill="#C0CAF5">matplotlib.pyplot </tspan><tspan fill="#BB9AF7">as </tspan><tspan fill="#C0CAF5">plt</tspan>
      </text>
    </g>

    <g clip-path="url(#d4)">
      <text x="56" y="202">
        <tspan fill="#C0CAF5">df </tspan><tspan fill="#89DDFF">= </tspan><tspan fill="#C0CAF5">pd</tspan><tspan fill="#7AA2F7">.read_csv</tspan><tspan fill="#C0CAF5">(</tspan><tspan fill="#9ECE6A">"sales.csv"</tspan><tspan fill="#C0CAF5">)</tspan>
      </text>
    </g>

    <g clip-path="url(#d5)">
      <text x="56" y="236">
        <tspan fill="#C0CAF5">top </tspan><tspan fill="#89DDFF">= </tspan><tspan fill="#C0CAF5">df</tspan><tspan fill="#7AA2F7">.groupby</tspan><tspan fill="#C0CAF5">(</tspan><tspan fill="#9ECE6A">"region"</tspan><tspan fill="#C0CAF5">)</tspan><tspan fill="#7AA2F7">.sum</tspan><tspan fill="#C0CAF5">()</tspan>
      </text>
    </g>

    <g clip-path="url(#d6)">
      <text x="56" y="270">
        <tspan fill="#C0CAF5">top</tspan><tspan fill="#C0CAF5">[</tspan><tspan fill="#9ECE6A">"revenue"</tspan><tspan fill="#C0CAF5">]</tspan><tspan fill="#7AA2F7">.plot</tspan><tspan fill="#C0CAF5">(</tspan><tspan fill="#E0AF68">kind</tspan><tspan fill="#89DDFF">=</tspan><tspan fill="#9ECE6A">"bar"</tspan><tspan fill="#C0CAF5">)</tspan>
      </text>
    </g>

    <g clip-path="url(#d7)">
      <text x="56" y="304">
        <tspan fill="#C0CAF5">plt</tspan><tspan fill="#7AA2F7">.show</tspan><tspan fill="#C0CAF5">()</tspan>
      </text>
    </g>
  </g>

  <!-- terminal prompt with blinking cursor -->
  <g font-family="'JetBrains Mono', monospace" font-size="18">
    <text x="56" y="352" fill="#9ECE6A">$</text>
    <rect x="74" y="336" width="10" height="20" fill="#7DCFFF">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
